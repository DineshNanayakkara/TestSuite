name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on: type check + pure unit tests. No Dataverse secrets required.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=unit
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-report
          path: artifacts/
          retention-days: 7

  # Full run against a real environment. Requires repository secrets; skipped if absent.
  forms:
    runs-on: ubuntu-latest
    needs: unit
    if: ${{ vars.RUN_FORM_TESTS == 'true' }}
    env:
      DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
      DATAVERSE_APP_ID: ${{ secrets.DATAVERSE_APP_ID }}
      SOLUTION_UNIQUE_NAME: ${{ secrets.SOLUTION_UNIQUE_NAME }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      UI_AUTH_MODE: credentials
      DATAVERSE_USERNAME: ${{ secrets.DATAVERSE_USERNAME }}
      DATAVERSE_PASSWORD: ${{ secrets.DATAVERSE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run discover
      - run: npx playwright test --project=forms
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forms-report
          path: artifacts/
          retention-days: 7
